services:
  db:
    image: postgres:16-alpine
    container_name: savestate_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: retro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retro_dev}
      POSTGRES_DB: retro_backlog
      # Optional: auto-create an admin user on first DB init
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retro -d retro_backlog"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: savestate_api
    restart: unless-stopped
    ports:
      - "3030:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://retro:${POSTGRES_PASSWORD:-retro_dev}@db:5432/retro_backlog
      # Optional: auto-create an admin user if it doesn't exist
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_DISPLAY_NAME=${ADMIN_DISPLAY_NAME:-Admin}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3030/api}
        VITE_FILES_URL: ${VITE_FILES_URL:-http://localhost:3030/uploads}
    container_name: savestate_web
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      - backend

  openapi:
    image: swaggerapi/swagger-ui:latest
    container_name: savestate_openapi
    restart: unless-stopped
    ports:
      - "3035:8080"
    environment:
      SWAGGER_JSON: /openapi.yaml
    volumes:
      - ./openapi.yaml:/openapi.yaml:ro

volumes:
  postgres_data:
  uploads_data:
